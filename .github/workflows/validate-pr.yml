# --------------------------------------------------------------
# NMSE PR Validation Workflow
# Builds and tests the NMSE project on pull requests that touch
# source files.  No artifacts are produced and no release is
# created - this exists purely to catch regressions before merge.
#
# NOTE: This uses 'dotnet build' (fast, managed IL) not
# 'dotnet publish' (slow, Native AOT).  AOT compilation is
# only performed in the release workflow (build-nmse.yml).
#
# All actions are pinned to immutable commit SHAs to mitigate
# supply-chain attacks.  When upgrading, update both the SHA
# and the version comment.
# --------------------------------------------------------------

name: Validate PR

env:
  PROJECT_FILE: NMSE.csproj
  TEST_PROJECT_FILE: NMSE.Tests/NMSE.Tests.csproj
  DOTNET_VERSION: "10.0.x"
  BUILD_CONFIGURATION: Release

on:
  # -- Un/comment the pull_request block below to enable PR validation --
  pull_request:
    paths:
      # Root-level project files
      - "NMSE.csproj"
      - "NMSE.slnx"
      - "Directory.Build.props"
      - "Program.cs"
      # Project source folders
      - "Config/**"
      - "Core/**"
      - "Data/**"
      - "IO/**"
      - "Models/**"
      - "UI/**"
      # Shared resources consumed by NMSE
      - "Resources/**"
      # Version file (PRs that bump version should also be validated)
      - "version.json"
      # Test project changes should trigger PR builds so test regressions
      # are caught before merge
      - "NMSE.Tests/**"
      # Never trigger on the extractor projects
      - "!NMSE.Extractor/**"
      - "!NMSE.Extractor.Tests/**"
      # Ignore the static site project
      - "!NMSE.Site/**"

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Restore test dependencies
        run: dotnet restore ${{ env.TEST_PROJECT_FILE }}

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --verbosity normal
