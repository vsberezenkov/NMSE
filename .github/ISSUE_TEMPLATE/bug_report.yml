name: Bug report
description: Create a report to help us improve NMSE.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please fill in every required field below. If you leave required fields blank or keep the title as just the prefix, the issue may be closed as incomplete.
  - type: input
    id: summary
    attributes:
      label: "Bug summary"
      description: "Complete the title prefix with a concise summary of the bug. This is required."
      placeholder: "XYZ has an error when doing ABC"
      required: true
  - type: checkboxes
    id: confirm_latest_release
    attributes:
      label: "Confirm the following statements"
      options:
        - label: "I have encountered this bug in the latest release of NMSE."
          value: "latest-release"
      required: true
  - type: checkboxes
    id: confirm_official_downloads
    attributes:
      options:
        - label: "I have encountered this bug in the official downloads of NMSE."
          value: "official-downloads"
      required: true
  - type: checkboxes
    id: confirm_searched_issues
    attributes:
      options:
        - label: "I have searched the issue tracker and found no duplicates."
          value: "searched-issues"
      required: true
  - type: checkboxes
    id: confirm_searched_docs
    attributes:
      options:
        - label: "I have searched the documentation and found nothing matching this bug."
          value: "searched-docs"
      required: true
  - type: checkboxes
    id: confirm_one_bug
    attributes:
      options:
        - label: "This issue contains only one bug report."
          value: "one-bug"
      required: true
  - type: checkboxes
    id: confirm_code_of_conduct
    attributes:
      options:
        - label: "I have read and agree to follow the code of conduct."
          value: "code-of-conduct"
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Bug description"
      description: "Describe what is happening and what the bug is. Be specific and include exact behavior."
      placeholder: "A clear and concise description of the problem."
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "List the exact steps needed to reproduce the bug."
      placeholder: "1. Step one\n2. Step two\n3. Step three"
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "Describe what you expected to happen."
      placeholder: "What should happen instead of the buggy behavior."
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Provide OS, NMSE version, branch/commit, and any other environment details."
      placeholder: "OS: Windows 11\nVersion: v1.2.3\nBranch/Commit: main / abc123"
      required: true
  - type: textarea
    id: additional_info
    attributes:
      label: "Additional information"
      description: "Add any extra details, logs, or notes that may help reproduce or diagnose the issue."
      placeholder: "Any relevant logs, screenshots, or other context."
      required: true
  - type: markdown
    attributes:
      value: "❤️ Thanks for helping to make NMSE better!"
